name: test-ci

on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true
      - run: make test

  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true